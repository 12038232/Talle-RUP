{% extends 'base.html' %}

{% block content %}

<h2>Registrar Usuario</h2>

<form method="POST">

<label>Nombre</label>
<br>
<input type="text" name="nombre" required>

<br><br>

<label>Email</label>
<br>
<input type="email" name="email" required>

<br><br>

<button type="submit">Registrar</button>

</form>

{% if mensaje %}
<p>{{mensaje}}</p>
{% endif %}

{% endblock %}
