{% extends 'base.html' %}

{% block content %}

<h2>Estudiantes registrados</h2>

{% if Estudiantes %}

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Correo</th>
<th>Acción</th>
</tr>

{% for e in Estudiantes %}

<tr>

<td>{{ e.id }}</td>
<td>{{ e.nombre }}</td>
<td>{{ e.correo }}</td>

<td>
<a href="/estudiantes/eliminar/{{ e.id }}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>

{% else %}

<p>No hay estudiantes registrados.</p>

{% endif %}

{% endblock %}
