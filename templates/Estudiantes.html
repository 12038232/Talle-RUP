{% extends 'base.html' %}

{% block content %}

<h2>Estudiantes registrados </h2>

{% if Estudiantes %}

<table border="1">
<tr>
<th>id</th>
<th>Nombre</th>
<th>correo institucional</th>
</tr>

{% for p in Estudiantes %}

<tr>
<td>{{ p.iD }}</td>
<td>{{ p.Nombre }}</td>
<td>{{ p.Correo institucional }}</td>

<td>
<a href="/Estudiantes/eliminar/{{p.iD}}">Eliminar</a>
</td>
</tr>

{% endfor %}

</table>

{% else %}

<p>No hay Estudiantes registrados</p>

{% endif %}

{% endblock %}
